connectors: [
  {
    name: "connector1",
    class: "com.kmwllc.lucille.connector.CSVConnector",
    idField: "id",
    path: "classpath:SkipDocumentTest/singleDoc.csv",
    pipeline: "pipeline1"
  }
]

pipelines: [
  {
    name: "pipeline1",
    stages: [
      {
        class = "com.kmwllc.lucille.stage.SkipDocument"
        conditions = [
          {
            fields = ["field1"]
            values = ["foo"]
            operator = "must"
          }
        ]
      }
      {
        class: "com.kmwllc.lucille.stage.CreateChildrenStage",
        numChildren: 2
      }
    ]
  }
]

indexer: {
  type: "NoOpIndexer",
  class: "com.kmwllc.lucille.indexer.NopIndexer"
}