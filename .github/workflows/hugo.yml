# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  # change contents to write access so we can add the version docs
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.3
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
        working-directory: doc/site
      - name: Install postcss
        run: npm install postcss-cli
        working-directory: doc/site

      # possible to-do for both: adding working-directory and shortening the paths

      - name: Get Versions
        run: |
          tags=$(git tag)
          for tag in $tags; do
            git checkout $tag -- doc/site/content/en/docs
            cp -r content/en/docs content/en/docs-$tag
          done
          git checkout HEAD -- doc/site/content/en/docs
        working-directory: doc/site

      - name: Update hugo.toml
        run: |
          tags=$(git tag)
          # Build the versions block
          versions_block="[[params.versions]]\n  version = \"latest\"\n  url = \"https://kmwtechnology.github.io/lucille/\"\n\n"
          for tag in $tags; do
            versions_block="${versions_block}[[params.versions]]\n  version = \"${tag}\"\n  url = \"https://kmwtechnology.github.io/lucille/docs-${tag}/\"\n\n"
          done
          
          # Insert it before the placeholder comment
          sed -i "s/# versions injected at build time/${versions_block}/" hugo.toml
        working-directory: doc/site

        # little debug
      - name: Debug versions
        run: |
          echo "Tags found:"
          git tag
          echo "Content folder:"
          ls content/en/
          echo "hugo.toml versions section:"
          cat hugo.toml
        working-directory: doc/site

      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
        working-directory: doc/site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./doc/site/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
