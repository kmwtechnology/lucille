# Crawls a Gmail mailbox over IMAP and indexes each email into an OpenSearch index named "emailindex".
#
# Sensitive / environment specific values default to placeholders so the config validates in unit tests,
# but should be supplied via environment variables when actually running:
#   GMAIL_USER           - your full gmail address, e.g. you@gmail.com
#   GMAIL_APP_PASSWORD   - a Google "App Password" (NOT your normal account password)
#   OPENSEARCH_URL       - defaults to http://localhost:9200
#   OPENSEARCH_INDEX     - defaults to emailindex

connectors: [
  {
    name: "gmailConnector"
    class: "com.kmwllc.lucille.imap.connector.IMAPConnector"
    pipeline: "emailPipeline"

    host: "imap.gmail.com"
    host: ${?GMAIL_IMAP_HOST}
    port: 993
    useSSL: true

    folder: "INBOX"
    folder: ${?GMAIL_FOLDER}
    # set to true to also crawl sub-folders / labels under the configured folder
    recurse: false

    # Placeholder credentials so the config validates; override with environment variables.
    username: "you@gmail.com"
    username: ${?GMAIL_USER}
    password: "your-app-password"
    password: ${?GMAIL_APP_PASSWORD}
  }
]

pipelines: [
  {
    name: "emailPipeline"
    stages: [
      {
        # The IMAPConnector emits the plain-text body under "text"; rename it to "body" to match the
        # OpenSearch mapping in mapping/opensearch_mappings.json.
        name: "renameBody"
        class: "com.kmwllc.lucille.stage.RenameFields"
        fieldMapping {
          "text": "body"
        }
        updateMode: "overwrite"
      }
      {
        # Drop the (often large, duplicate) HTML body so the index stays lean. Remove this stage if you
        # want to keep the raw HTML.
        name: "dropHtml"
        class: "com.kmwllc.lucille.stage.DeleteFields"
        fields: ["html"]
      }
    ]
  }
]

indexer {
  type: "OpenSearch"
  batchSize: 100
  batchTimeout: 1000
  sendEnabled: true
}

opensearch {
  url: "http://localhost:9200"
  url: ${?OPENSEARCH_URL}

  index: "emailindex"
  index: ${?OPENSEARCH_INDEX}

  acceptInvalidCert: true
}

worker {
  pipeline: "emailPipeline"
  threads: 1
}
